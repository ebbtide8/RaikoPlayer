<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radiko PWA Player</title>
    <!-- manifest.json の読み込み -->
    <link rel="manifest" href="./manifest.json">
    <!-- モバイルブラウザ用のテーマカラー -->
    <meta name="theme-color" content="#1f6aa5">
    <!-- M4AやMP3のタグを解析するライブラリを読み込み -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        
        /* ハンバーガーボタン */
        .burger-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            cursor: pointer;
            z-index: 30;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 25px;
            height: 18px;
        }
        .burger-btn span {
            display: block;
            height: 3px;
            width: 100%;
            background-color: #ffffff;
            border-radius: 3px;
            transition: 0.3s;
        }
        
        /* 設定サイドパネル */
        .settings-panel {
            position: absolute;
            top: 0;
            left: -320px; /* 初期状態は画面外 */
            width: 300px;
            height: 100%;
            background-color: #252525;
            box-shadow: 4px 0 15px rgba(0,0,0,0.5);
            transition: left 0.3s ease-in-out;
            z-index: 20;
            box-sizing: border-box;
            padding: 80px 20px 20px 20px;
            display: flex;
            flex-direction: column;
        }
        .settings-panel.active {
            left: 0;
        }
        .settings-title {
            font-size: 18px;
            font-weight: bold;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        
        /* ディレクトリ内のファイルリスト表示 */
        .folder-sync-btn {
            background-color: #27ae60;
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            display: inline-block;
            margin-bottom: 15px;
            text-align: center;
        }
        .folder-sync-btn:hover { background-color: #219653; }
        .file-list-container {
            flex-grow: 1;
            overflow-y: auto;
            background-color: #1a1a1a;
            border-radius: 6px;
            padding: 10px;
        }
        .file-list-title {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .file-item {
            font-size: 13px;
            padding: 6px 8px;
            cursor: pointer;
            border-radius: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .file-item:hover {
            background-color: #1f6aa5;
        }

        /* メインのプレイヤーカード */
        .player-card {
            background-color: #2d2d2d;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 450px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        /* ファイル選択ボタン（情報エリアの下に配置するためマージン調整） */
        .file-input-label {
            display: inline-block;
            background-color: #1f6aa5;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 5px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .file-input-label:hover {
            background-color: #144d77;
        }
        input[type="file"] {
            display: none;
        }
        
        /* メタデータ表示エリア（最上部に配置） */
        .meta-container {
            display: flex;
            flex-direction: column;
            background-color: #202020;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: left;
        }
        
        .cover-art {
            width: 100%;
            height: 200px;
            background-color: #3a3a3a;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            color: #888;
            margin-bottom: 15px;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .cover-art:hover {
            opacity: 0.8;
        }
        
        .track-info {
            width: 100%;
            overflow: hidden;
        }
        .track-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .track-album, .track-artist {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* 歌詞オーバーレイ */
        .lyrics-overlay {
            position: absolute;
            bottom: -100%;
            left: 0;
            width: 100%;
            height: 80%;
            background-color: rgba(40, 40, 40, 0.95);
            box-sizing: border-box;
            padding: 25px;
            border-top: 2px solid #1f6aa5;
            transition: bottom 0.3s ease-in-out;
            text-align: left;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }
        .lyrics-overlay.active {
            bottom: 0;
        }
        .lyrics-header {
            font-size: 14px;
            font-weight: bold;
            color: #1f6aa5;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
        }
        .lyrics-content {
            flex-grow: 1;
            overflow-y: auto;
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
            color: #eee;
            padding-right: 5px;
        }
        
        /* レジューム通知 */
        .resume-status {
            font-size: 12px;
            color: #2ecc71;
            margin-bottom: 10px;
            height: 18px;
        }
        
        audio {
            width: 100%;
        }
        
        /* メニューが開いている時の背景レイヤー */
        .sidebar-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 15;
        }
        .sidebar-overlay.active {
            display: block;
        }
    </style>
</head>
<body>

<!-- ハンバーガーボタン -->
<div class="burger-btn" id="burger-btn">
    <span></span>
    <span></span>
    <span></span>
</div>

<!-- メニュー背景レイヤー -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<!-- 設定サイドパネル -->
<div class="settings-panel" id="settings-panel">
    <div class="settings-title">設定・ディレクトリ</div>
    
    <!-- 疑似デフォルトディレクトリ（フォルダ同期機能） -->
    <label class="folder-sync-btn">
        📁 デフォルトフォルダ同期
        <!-- webkitdirectory属性でフォルダ内の全ファイルを対象にする -->
        <input type="file" id="folder-input" webkitdirectory directory multiple style="display:none;">
    </label>
    
    <div class="file-list-title">フォルダ内ファイル一覧</div>
    <div class="file-list-container" id="file-list">
        <div style="font-size:12px; color:#555; text-align:center; margin-top:20px;">フォルダが同期されていません</div>
    </div>
</div>

<!-- メインプレイヤーカード -->
<div class="player-card">
    <h2>Radiko PWA Player</h2>
    
    <!-- 1. メタデータ・カバーアート表示領域（最上部へ） -->
    <div class="meta-container">
        <div class="cover-art" id="cover-art" title="クリックで歌詞を表示">[No Cover]</div>
        <div class="track-info">
            <div class="track-title" id="track-title">-</div>
            <div class="track-album" id="track-album">-</div>
            <div class="track-artist" id="track-artist">-</div>
        </div>
    </div>
    
    <!-- 2. 音声ファイルを選択ボタン（情報エリアの下、シークバーの上に移動） -->
    <label class="file-input-label">
        ▼ 音声ファイルを選択
        <input type="file" id="audio-file" accept="audio/*">
    </label>
    
    <!-- レジューム状態の通知メッセージ -->
    <div class="resume-status" id="resume-status"></div>
    
    <!-- 3. シークバー（プレイヤー本体） -->
    <audio id="audio-player" controls></audio>

    <!-- 歌詞オーバーレイ構造 -->
    <div class="lyrics-overlay" id="lyrics-overlay">
        <div class="lyrics-header" id="lyrics-close">
            <span>【歌詞表示】</span>
            <span>閉じる ✕</span>
        </div>
        <div class="lyrics-content" id="lyrics-content">歌詞情報がありません。</div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('audio-file');
    const folderInput = document.getElementById('folder-input');
    const audioPlayer = document.getElementById('audio-player');
    
    // UI要素
    const trackTitle = document.getElementById('track-title');
    const trackAlbum = document.getElementById('track-album');
    const trackArtist = document.getElementById('track-artist');
    const coverArt = document.getElementById('cover-art');
    const resumeStatus = document.getElementById('resume-status');
    
    // 歌詞・メニューUI要素
    const lyricsOverlay = document.getElementById('lyrics-overlay');
    const lyricsContent = document.getElementById('lyrics-content');
    const lyricsClose = document.getElementById('lyrics-close');
    const burgerBtn = document.getElementById('burger-btn');
    const settingsPanel = document.getElementById('settings-panel');
    const sidebarOverlay = document.getElementById('sidebar-overlay');
    const fileListContainer = document.getElementById('file-list');

    let currentFileName = "";
    let loadedLyrics = "";
    let synchronizedFiles = []; // 同期されたファイルオブジェクトの保管庫

    // ハンバーガーメニューの開閉処理
    burgerBtn.addEventListener('click', toggleMenu);
    sidebarOverlay.addEventListener('click', toggleMenu);

    function toggleMenu() {
        settingsPanel.classList.toggle('active');
        sidebarOverlay.classList.toggle('active');
    }

    // デフォルトフォルダ同期の処理
    folderInput.addEventListener('change', function(e) {
        const files = Array.from(e.target.files);
        // 音声ファイルだけを抽出してソート
        synchronizedFiles = files.filter(file => file.type.startsWith('audio/') || file.name.endsWith('.m4a')).sort((a, b) => a.name.localeCompare(b.name));
        
        renderFileList();
    });

    // サイドバー内のファイルリストを描画
    function renderFileList() {
        fileListContainer.innerHTML = "";
        if (synchronizedFiles.length === 0) {
            fileListContainer.innerHTML = '<div style="font-size:12px; color:#555; text-align:center; margin-top:20px;">音声ファイルが見つかりません</div>';
            return;
        }

        synchronizedFiles.forEach((file, index) => {
            const item = document.createElement('div');
            item.className = 'file-item';
            item.textContent = file.name;
            item.title = file.name;
            item.addEventListener('click', () => {
                loadAudioFile(file);
                toggleMenu(); // ファイル選択後にメニューを閉じる
            });
            fileListContainer.appendChild(item);
        });
    }

    // ファイル単体選択時のイベント
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) loadAudioFile(file);
    });

    // コア：音声ファイルの読み込みと再生処理
    function loadAudioFile(file) {
        currentFileName = file.name;
        resumeStatus.textContent = "";
        loadedLyrics = "";
        lyricsOverlay.classList.remove('active');

        // 1. タグ情報の読み込み
        jsmediatags.read(file, {
            onSuccess: function(tag) {
                const tags = tag.tags;
                trackTitle.textContent = tags.title || file.name;
                trackAlbum.textContent = tags.album || "-";
                trackArtist.textContent = tags.artist || "-";

                if (tags.lyrics) {
                    loadedLyrics = tags.lyrics;
                } else if (tags.unsynchronisedLyrics) {
                    loadedLyrics = tags.unsynchronisedLyrics.text;
                }
                
                lyricsContent.textContent = loadedLyrics ? loadedLyrics : "歌詞情報が含まれていないか、読み込めませんでした。";

                if (tags.picture) {
                    const { data, format } = tags.picture;
                    let base64String = "";
                    for (let i = 0; i < data.length; i++) {
                        base64String += String.fromCharCode(data[i]);
                    }
                    coverArt.style.backgroundImage = `url(data:${format};base64,${btoa(base64String)})`;
                    coverArt.textContent = "";
                } else {
                    coverArt.style.backgroundImage = "none";
                    coverArt.textContent = "[No Cover] (クリックで歌詞)";
                }
            },
            onError: function(error) {
                trackTitle.textContent = file.name;
                trackAlbum.textContent = "-";
                trackArtist.textContent = "-";
                coverArt.style.backgroundImage = "none";
                coverArt.textContent = "[No Cover]";
                lyricsContent.textContent = "タグの読み込みエラーのため、歌詞を表示できません。";
            }
        });

        // 2. 再生ソースの設定
        const fileURL = URL.createObjectURL(file);
        audioPlayer.src = fileURL;

        // 3. レジュームの復元
        const savedTime = localStorage.getItem(`resume_${currentFileName}`);
        if (savedTime) {
            const parseFloatTime = parseFloat(savedTime);
            audioPlayer.currentTime = parseFloatTime;
            
            const minutes = Math.floor(parseFloatTime / 60);
            const seconds = Math.floor(parseFloatTime % 60);
            resumeStatus.textContent = `前回の停止位置（${minutes}分${seconds}秒）から再開しました`;
        }

        audioPlayer.play().catch(err => {
            console.log("自動再生がブロックされました。", err);
        });
    }

    // アートワーククリックで歌詞の表示
    coverArt.addEventListener('click', function() {
        if (currentFileName) lyricsOverlay.classList.toggle('active');
    });

    lyricsClose.addEventListener('click', function() {
        lyricsOverlay.classList.remove('active');
    });

    // 再生位置の自動記録
    audioPlayer.addEventListener('timeupdate', function() {
        if (currentFileName && audioPlayer.currentTime > 0) {
            localStorage.setItem(`resume_${currentFileName}`, audioPlayer.currentTime);
        }
    });

    // 再生完了時の処理
    audioPlayer.addEventListener('ended', function() {
        if (currentFileName) {
            localStorage.removeItem(`resume_${currentFileName}`);
            resumeStatus.textContent = "再生が完了しました";
        }
    });

    // Service Worker の登録処理
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then((reg) => console.log('Service Worker 登録成功:', reg.scope))
                .catch((err) => console.log('Service Worker 登録失敗:', err));
        });
    }

</script>

</body>
</html>

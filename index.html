<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: #f5f5f5;
            text-align: center;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: 20px auto;
        }
        .info {
            text-align: left;
            margin-top: 20px;
        }
        .info p {
            margin: 8px 0;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
        }
    </style>
</head>
<body>

    <h1>Tags</h1>
    
    <div class="card">
        <input type="file" id="file-input" accept="audio/mpeg, .m4a">
        
        <div class="info">
            <p><strong></strong> <span id="title">-</span></p>
            <p><strong></strong> <span id="artist">-</span></p>
            <p><strong></strong> <span id="album">-</span></p>
            <p><strong></strong> <span id="lyrics">-</span></p>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');

        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;

            // jsmediatagsを使ってファイルを読み込み
            window.jsmediatags.read(file, {
                onSuccess: function(tag) {
                    const tags = tag.tags;
                    
                    // 画面のテキストを書き換え
                    document.getElementById('title').textContent = tags.title || '（未設定）';
                    document.getElementById('artist').textContent = tags.artist || '（未設定）';
                    document.getElementById('album').textContent = tags.album || '（未設定）';
                    document.getElementById('lyrics').textContent = tags.lyrics || '（未設定）';
                },
                onError: function(error) {
                    alert('タグの読み込みに失敗しました: ' + error.type);
                    console.error(error);
                }
            });
        });
    </script>
</body>
</html>
